services:
  - type: web
    name: devforge-api
    runtime: python
    plan: free
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn devforge.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: APP_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-5.6-terra
      - key: OPENAI_API_KEY
        sync: false
      - key: INTERNAL_API_TOKEN
        generateValue: true
      - key: SAFETY_HASH_SECRET
        generateValue: true
